<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Drawing Playground - Big Screen</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; }
  #stage { position: relative; width: 100%; height: 100%; overflow: hidden; transition: background 0.6s; }

  #topBar {
    position: fixed; top: 16px; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px;
    z-index: 20;
    pointer-events: none;
  }
  #titleText {
    color: rgba(255,255,255,0.92);
    font-size: clamp(18px, 2.6vw, 30px);
    font-weight: 800;
    text-shadow: 0 2px 8px rgba(0,0,0,0.35);
    pointer-events: none;
  }
  #topRightControls { display: flex; gap: 8px; pointer-events: auto; }
  #topRightControls button {
    border: none; background: rgba(0,0,0,0.35); color: #fff;
    padding: 10px 16px; border-radius: 999px; font-size: 14px; font-weight: 700;
    cursor: pointer; backdrop-filter: blur(4px);
  }
  #topRightControls button:hover { background: rgba(0,0,0,0.5); }

  .item {
    position: absolute; top: 0; left: 0; will-change: transform;
    filter: drop-shadow(0 6px 14px rgba(0,0,0,0.3));
    opacity: 0; transition: opacity 0.6s ease;
  }
  .item img { display: block; pointer-events: none; }
  .item.show { opacity: 1; }
  .item .label {
    position: absolute; left: 50%; bottom: -22px; transform: translateX(-50%);
    color: rgba(255,255,255,0.9); font-size: 13px; font-weight: 700;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6); white-space: nowrap;
  }
  @keyframes sparkleGlow {
    0%, 100% { filter: drop-shadow(0 6px 14px rgba(0,0,0,0.3)) drop-shadow(0 0 0 rgba(255,215,0,0)); }
    50% { filter: drop-shadow(0 6px 14px rgba(0,0,0,0.3)) drop-shadow(0 0 34px rgba(255,215,0,0.95)); }
  }
  .item.sparkle { animation: sparkleGlow 0.55s ease-in-out 4; }

  .deco { position: absolute; pointer-events: none; }

  #addBtn {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    border: none; background: #ff5252; color: #fff;
    font-size: 18px; font-weight: 800; padding: 16px 32px; border-radius: 999px;
    cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.3); z-index: 20;
  }
  #addBtn:active { transform: translateX(-50%) scale(0.96); }

  #count {
    position: fixed; bottom: 14px; left: 20px; z-index: 20;
    color: rgba(255,255,255,0.5); font-size: 13px;
  }

  /* 연결 상태 배너 */
  #connStatus {
    position: fixed; top: 0; left: 0; right: 0; text-align: center;
    padding: 8px; font-size: 13px; font-weight: 700; color: #fff;
    transform: translateY(-100%); transition: transform 0.25s; z-index: 60;
  }
  #connStatus.show { transform: translateY(0); }
  #connStatus.warn { background: #d32f2f; }
  #connStatus.ok { background: #2e7d32; }

  /* 제출 로그 패널 */
  #logTab {
    position: fixed; top: 50%; right: 0; transform: translateY(-50%);
    z-index: 40; border: none; background: rgba(0,0,0,0.4); color: #fff;
    padding: 14px 8px; border-radius: 12px 0 0 12px; cursor: pointer;
    font-size: 13px; font-weight: 700; writing-mode: vertical-rl; text-orientation: mixed;
  }
  #logPanel {
    position: fixed; top: 0; right: 0; bottom: 0; width: min(320px, 82vw);
    background: rgba(20,20,26,0.94); color: #fff; z-index: 39;
    transform: translateX(100%); transition: transform 0.3s ease;
    display: flex; flex-direction: column; backdrop-filter: blur(6px);
  }
  #logPanel.open { transform: translateX(0); }
  #logPanel.open ~ #logTab, #logTab.open { transform: translateY(-50%); }
  #logHeader {
    padding: 18px 16px 10px; font-weight: 800; font-size: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.15); flex-shrink: 0;
  }
  #logList { flex: 1; overflow-y: auto; padding: 8px 10px; }
  .logEntry {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    padding: 10px 8px; border-radius: 10px; margin-bottom: 4px;
  }
  .logEntry:hover { background: rgba(255,255,255,0.06); }
  .logEntry.deleted { opacity: 0.4; }
  .logInfo { min-width: 0; }
  .logName { font-weight: 700; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .logTime { font-size: 12px; color: rgba(255,255,255,0.55); }
  .logActions { display: flex; gap: 4px; flex-shrink: 0; }
  .logBtn {
    border: none; background: rgba(255,255,255,0.1); color: #fff;
    width: 30px; height: 30px; border-radius: 8px; cursor: pointer; font-size: 14px;
  }
  .logBtn:hover:not(:disabled) { background: rgba(255,255,255,0.22); }
  .logBtn:disabled { opacity: 0.3; cursor: default; }
  #logEmpty { padding: 20px 8px; color: rgba(255,255,255,0.5); font-size: 13px; text-align: center; }
  #logFooter {
    flex-shrink: 0; display: flex; gap: 8px; padding: 10px;
    border-top: 1px solid rgba(255,255,255,0.15);
  }
  #logFooter button {
    flex: 1; border: none; border-radius: 10px; padding: 10px 8px;
    font-size: 13px; font-weight: 700; cursor: pointer; color: #fff;
  }
  #pauseBtn { background: rgba(255,255,255,0.12); }
  #pauseBtn.paused { background: #ffb300; color: #221; }
  #clearAllBtn { background: rgba(255,82,82,0.25); }
  #clearAllBtn:hover { background: rgba(255,82,82,0.4); }

  /* QR 모달 */
  #modalOverlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55);
    display: none; align-items: center; justify-content: center; z-index: 50;
  }
  #modalOverlay.show { display: flex; }
  #modalBox {
    background: #fff; border-radius: 24px; padding: 36px 44px;
    text-align: center; max-width: 90vw;
  }
  #modalBox h2 { font-size: 22px; margin-bottom: 6px; color: #222; }
  #modalBox p { color: #777; font-size: 14px; margin-bottom: 18px; }
  #qrImg { width: 260px; height: 260px; border-radius: 12px; }
  #drawUrlText {
    margin-top: 14px; font-size: 13px; color: #999; word-break: break-all;
  }
  #modalButtons { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
  #copyLinkBtn, #closeModalBtn {
    border: none; color: #333;
    padding: 10px 24px; border-radius: 999px; font-weight: 700; cursor: pointer;
  }
  #copyLinkBtn { background: #eef0ff; color: #3f3fbf; }
  #closeModalBtn { background: #eee; }

  #loadingMsg, #errorBox {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px; color: #fff; background: #111; z-index: 100;
  }
  #errorBox { display: none; }
  #errorBox a {
    color: #fff; background: #ff5252; padding: 12px 26px; border-radius: 999px;
    text-decoration: none; font-weight: 700;
  }
</style>
</head>
<body>
<div id="connStatus"></div>
<div id="loadingMsg">Loading...</div>
<div id="errorBox">
  <div>This playground couldn't be found. (It may have ended, or the address is wrong.)</div>
  <a href="/">Back to Home</a>
</div>

<div id="stage" style="display:none;">
  <div id="topBar">
    <div id="titleText"></div>
    <div id="topRightControls">
      <button id="muteBtn" title="Toggle sound"></button>
      <button id="fullscreenBtn" title="Fullscreen">⛶</button>
      <button id="exitBtn">Exit ✕</button>
    </div>
  </div>
  <div id="count"></div>
</div>

<button id="addBtn" style="display:none;">➕ Add a Drawing</button>

<button id="logTab">Log (<span id="logCount">0</span>)</button>
<div id="logPanel">
  <div id="logHeader">Submissions</div>
  <div id="logList"></div>
  <div id="logFooter">
    <button id="pauseBtn">⏸ Pause</button>
    <button id="clearAllBtn">🗑️ Clear All</button>
  </div>
</div>

<div id="modalOverlay">
  <div id="modalBox">
    <h2>📱 Scan the QR with a tablet</h2>
    <p>Scanning takes you straight to the drawing screen</p>
    <img id="qrImg" src="" alt="QR code" />
    <div id="drawUrlText"></div>
    <div id="modalButtons">
      <button id="copyLinkBtn">Copy Link</button>
      <button id="closeModalBtn">Close</button>
    </div>
  </div>
</div>

<script src="/themes.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script>
  const sessionId = location.pathname.split('/').filter(Boolean).pop();
  const socket = io();

  const stage = document.getElementById('stage');
  const loadingMsg = document.getElementById('loadingMsg');
  const errorBox = document.getElementById('errorBox');
  const addBtn = document.getElementById('addBtn');
  const countEl = document.getElementById('count');
  const titleText = document.getElementById('titleText');
  const modalOverlay = document.getElementById('modalOverlay');
  const qrImg = document.getElementById('qrImg');
  const drawUrlText = document.getElementById('drawUrlText');
  const connStatus = document.getElementById('connStatus');
  const logTab = document.getElementById('logTab');
  const logPanel = document.getElementById('logPanel');
  const logList = document.getElementById('logList');
  const logCountEl = document.getElementById('logCount');
  const muteBtn = document.getElementById('muteBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const clearAllBtn = document.getElementById('clearAllBtn');

  const MAX_ITEMS = 35;
  const MAX_DIM = 220;
  const MIN_DIM = 90;
  const LOG_LIMIT = 300;
  const items = [];
  const logEntries = [];
  let theme = 'ocean';

  function rand(min, max) { return Math.random() * (max - min) + min; }

  // ---- 연결 상태 표시 ----
  let everConnected = false;
  socket.on('connect', () => {
    if (everConnected) {
      connStatus.textContent = 'Reconnected ✓';
      connStatus.className = 'show ok';
      setTimeout(() => connStatus.classList.remove('show'), 2000);
    }
    everConnected = true;
  });
  socket.on('disconnect', () => {
    connStatus.textContent = 'Connection lost — retrying…';
    connStatus.className = 'show warn';
  });

  // ---- 효과음 (외부 파일 없이 WebAudio로 생성) ----
  let audioCtx = null;
  let muted = localStorage.getItem('drawingWallMuted') === '1';
  function updateMuteBtn() { muteBtn.textContent = muted ? '🔇' : '🔊'; }
  updateMuteBtn();
  muteBtn.addEventListener('click', () => {
    muted = !muted;
    localStorage.setItem('drawingWallMuted', muted ? '1' : '0');
    updateMuteBtn();
  });
  document.addEventListener('click', function unlockAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    } else if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }, { once: true });

  function playChime() {
    if (muted) return;
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const t0 = audioCtx.currentTime;
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(880, t0);
      o.frequency.exponentialRampToValueAtTime(1320, t0 + 0.12);
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(0.15, t0 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.4);
      o.connect(g);
      g.connect(audioCtx.destination);
      o.start(t0);
      o.stop(t0 + 0.4);
    } catch (e) {}
  }

  // ---- 세션 정보 불러오기 ----
  let sessionInfo = null;
  fetch(`/api/session/${sessionId}`)
    .then((r) => { if (!r.ok) throw new Error('not_found'); return r.json(); })
    .then((data) => {
      sessionInfo = data;
      theme = data.theme;
      init();
    })
    .catch(() => {
      loadingMsg.style.display = 'none';
      errorBox.style.display = 'flex';
    });

  function init() {
    loadingMsg.style.display = 'none';
    stage.style.display = 'block';
    addBtn.style.display = 'block';

    const t = THEMES[theme] || THEMES.ocean;
    stage.style.background = t.bgGradient;
    titleText.textContent = sessionInfo.title || '';
    updatePauseBtn(!!sessionInfo.paused);

    createDecorations(theme);

    socket.emit('joinSession', { sessionId, role: 'display' });
    requestAnimationFrame(tick);
  }

  // ---- 배경 장식 (테마별) ----
  function createDecorations(theme) {
    if (theme === 'space') {
      for (let i = 0; i < 70; i++) {
        const s = document.createElement('div');
        s.className = 'deco';
        const size = rand(1, 3);
        s.style.width = size + 'px';
        s.style.height = size + 'px';
        s.style.left = rand(0, 100) + '%';
        s.style.top = rand(0, 100) + '%';
        s.style.background = '#fff';
        s.style.borderRadius = '50%';
        s.style.opacity = rand(0.2, 0.9);
        s.style.animation = `twinkle ${rand(2, 4)}s ease-in-out ${rand(0, 3)}s infinite`;
        stage.appendChild(s);
      }
      injectKeyframes('@keyframes twinkle {0%,100%{opacity:.15}50%{opacity:.9}}');
    } else if (theme === 'ocean') {
      for (let i = 0; i < 18; i++) {
        const b = document.createElement('div');
        b.className = 'deco';
        const size = rand(8, 22);
        b.style.width = size + 'px';
        b.style.height = size + 'px';
        b.style.left = rand(0, 100) + '%';
        b.style.bottom = '-30px';
        b.style.background = 'rgba(255,255,255,0.35)';
        b.style.borderRadius = '50%';
        b.style.animation = `bubbleUp ${rand(6, 14)}s linear ${rand(0, 8)}s infinite`;
        stage.appendChild(b);
      }
      injectKeyframes('@keyframes bubbleUp {0%{transform:translateY(0);opacity:.8}100%{transform:translateY(-110vh);opacity:0}}');
    } else if (theme === 'sky') {
      for (let i = 0; i < 8; i++) {
        const c = document.createElement('div');
        c.className = 'deco';
        const w = rand(80, 180);
        c.style.width = w + 'px';
        c.style.height = w * 0.4 + 'px';
        c.style.top = rand(5, 70) + '%';
        c.style.left = -w + 'px';
        c.style.background = 'rgba(255,255,255,0.7)';
        c.style.borderRadius = '999px';
        c.style.filter = 'blur(1px)';
        c.style.animation = `driftRight ${rand(30, 60)}s linear ${rand(0, 20)}s infinite`;
        stage.appendChild(c);
      }
      injectKeyframes('@keyframes driftRight {0%{transform:translateX(0)}100%{transform:translateX(120vw)}}');
    } else if (theme === 'forest') {
      for (let i = 0; i < 20; i++) {
        const l = document.createElement('div');
        l.className = 'deco';
        l.textContent = ['🍃', '🍂', '🌿'][Math.floor(rand(0, 3))];
        l.style.fontSize = rand(14, 26) + 'px';
        l.style.left = rand(0, 100) + '%';
        l.style.top = '-30px';
        l.style.animation = `leafFall ${rand(8, 16)}s linear ${rand(0, 10)}s infinite`;
        stage.appendChild(l);
      }
      injectKeyframes('@keyframes leafFall {0%{transform:translateY(0) rotate(0deg);opacity:.9}100%{transform:translateY(115vh) rotate(360deg);opacity:.5}}');
    }
  }

  function injectKeyframes(rule) {
    const styleEl = document.createElement('style');
    styleEl.textContent = rule;
    document.head.appendChild(styleEl);
  }

  // ---- 그림 추가 ----
  function addDrawing(data) {
    const img = new Image();
    img.onload = () => {
      const stageW = stage.clientWidth;
      const stageH = stage.clientHeight;
      let w = img.naturalWidth;
      let h = img.naturalHeight;
      const scale = Math.min(MAX_DIM / Math.max(w, h), 1);
      w = Math.max(MIN_DIM, w * scale);
      h = Math.max(MIN_DIM, h * (w / img.naturalWidth));
      if (h > MAX_DIM) { const s2 = MAX_DIM / h; w *= s2; h *= s2; }

      const el = document.createElement('div');
      el.className = 'item';
      el.dataset.id = data.id;
      el.style.width = w + 'px';
      el.style.height = h + 'px';
      el.appendChild(img);
      img.style.width = '100%';
      img.style.height = '100%';

      if (data.name) {
        const label = document.createElement('div');
        label.className = 'label';
        label.textContent = data.name;
        el.appendChild(label);
      }
      stage.appendChild(el);

      const x = rand(0, Math.max(0, stageW - w));
      const y = rand(0, Math.max(0, stageH - h));
      const speed = rand(35, 75);
      const angle = rand(0, Math.PI * 2);

      const item = {
        id: data.id, el, w, h, x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        bob: rand(0, Math.PI * 2),
        rotSpeed: rand(-6, 6)
      };
      items.push(item);
      requestAnimationFrame(() => el.classList.add('show'));

      while (items.length > MAX_ITEMS) {
        const old = items.shift();
        old.el.classList.remove('show');
        setTimeout(() => old.el.remove(), 700);
      }
      updateCount();
    };
    img.src = data.image;
  }

  function updateCount() {
    countEl.textContent = items.length > 0 ? `${items.length} drawings playing` : '';
  }

  // ---- 제출 로그 ----
  function formatTime(ts) {
    const d = new Date(ts);
    const pad = (n) => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }

  function renderLogEntry(entry) {
    const row = document.createElement('div');
    row.className = 'logEntry' + (entry.deleted ? ' deleted' : '');
    row.dataset.id = entry.id;

    const info = document.createElement('div');
    info.className = 'logInfo';
    const nameEl = document.createElement('div');
    nameEl.className = 'logName';
    nameEl.textContent = entry.name || 'Anonymous';
    const timeEl = document.createElement('div');
    timeEl.className = 'logTime';
    timeEl.textContent = formatTime(entry.createdAt);
    info.appendChild(nameEl);
    info.appendChild(timeEl);

    const actions = document.createElement('div');
    actions.className = 'logActions';
    const sparkleBtn = document.createElement('button');
    sparkleBtn.className = 'logBtn';
    sparkleBtn.title = 'Highlight';
    sparkleBtn.textContent = '✨';
    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'logBtn';
    deleteBtn.title = 'Delete';
    deleteBtn.textContent = '🗑️';

    if (entry.deleted) {
      sparkleBtn.disabled = true;
      deleteBtn.disabled = true;
    } else {
      deleteBtn.addEventListener('click', () => socket.emit('adminDeleteDrawing', { drawingId: entry.id }));
      sparkleBtn.addEventListener('click', () => socket.emit('adminHighlightDrawing', { drawingId: entry.id }));
    }
    actions.appendChild(sparkleBtn);
    actions.appendChild(deleteBtn);

    row.appendChild(info);
    row.appendChild(actions);
    return row;
  }

  function addLogEntry(data) {
    const entry = { id: data.id, name: data.name, createdAt: data.createdAt || Date.now(), deleted: false };
    logEntries.unshift(entry);
    if (logEntries.length > LOG_LIMIT) logEntries.pop();
    logList.insertBefore(renderLogEntry(entry), logList.firstChild);
    while (logList.children.length > LOG_LIMIT) logList.removeChild(logList.lastChild);
    logCountEl.textContent = logEntries.length;
  }

  function markLogEntryDeleted(id) {
    const entry = logEntries.find((e) => e.id === id);
    if (entry) entry.deleted = true;
    const row = logList.querySelector(`[data-id="${CSS.escape(id)}"]`);
    if (row) {
      row.classList.add('deleted');
      row.querySelectorAll('button').forEach((b) => (b.disabled = true));
    }
  }

  logTab.addEventListener('click', () => logPanel.classList.toggle('open'));

  // ---- 일시정지 / 전체 지우기 ----
  let isPaused = false;
  function updatePauseBtn(paused) {
    isPaused = paused;
    pauseBtn.textContent = paused ? '▶ Resume' : '⏸ Pause';
    pauseBtn.classList.toggle('paused', paused);
  }
  pauseBtn.addEventListener('click', () => {
    socket.emit('adminSetPaused', { paused: !isPaused });
  });
  socket.on('pausedStateChanged', ({ paused }) => updatePauseBtn(!!paused));

  clearAllBtn.addEventListener('click', () => {
    if (items.length === 0) return;
    if (!confirm(`Clear all ${items.length} drawings from the screen?`)) return;
    items.slice().forEach((item) => socket.emit('adminDeleteDrawing', { drawingId: item.id }));
  });

  // ---- 반짝임 강조 파티클 ----
  function spawnSparkles(item) {
    for (let i = 0; i < 6; i++) {
      const s = document.createElement('div');
      s.textContent = '✨';
      s.style.position = 'absolute';
      s.style.left = (item.x + item.w / 2) + 'px';
      s.style.top = (item.y + item.h / 2) + 'px';
      s.style.fontSize = (16 + Math.random() * 14) + 'px';
      s.style.pointerEvents = 'none';
      s.style.zIndex = '15';
      s.style.transition = 'transform 0.9s ease-out, opacity 0.9s ease-out';
      s.style.opacity = '1';
      stage.appendChild(s);
      const angle = Math.random() * Math.PI * 2;
      const dist = 40 + Math.random() * 50;
      requestAnimationFrame(() => {
        s.style.transform = `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px)`;
        s.style.opacity = '0';
      });
      setTimeout(() => s.remove(), 950);
    }
  }

  // ---- 물리 애니메이션 (테마별로 살짝 다른 느낌) ----
  let lastTime = performance.now();
  function tick(now) {
    const dt = Math.min(0.05, (now - lastTime) / 1000);
    lastTime = now;
    const stageW = stage.clientWidth;
    const stageH = stage.clientHeight;

    for (const item of items) {
      item.x += item.vx * dt;
      item.bob += dt;

      let yDrift = item.vy * dt;
      if (theme === 'ocean') {
        // 물고기처럼: 좌우 위주로 움직이고 위아래로 살짝 헤엄치듯 흔들림
        yDrift += Math.sin(item.bob * 2) * 8 * dt;
      } else if (theme === 'sky') {
        // 풍선처럼: 천천히 위로 뜨는 느낌 + 좌우 흔들림
        yDrift -= 6 * dt;
        item.x += Math.sin(item.bob) * 6 * dt;
      }
      item.y += yDrift;

      if (item.x <= 0) { item.x = 0; item.vx = Math.abs(item.vx); }
      if (item.x + item.w >= stageW) { item.x = stageW - item.w; item.vx = -Math.abs(item.vx); }
      if (item.y <= 0) { item.y = 0; item.vy = Math.abs(item.vy); }
      if (item.y + item.h >= stageH) { item.y = stageH - item.h; item.vy = -Math.abs(item.vy); }

      const wobble = Math.sin(item.bob * (item.rotSpeed / 3 || 1)) * 6;
      item.el.style.transform = `translate(${item.x}px, ${item.y}px) rotate(${wobble}deg)`;
    }
    requestAnimationFrame(tick);
  }

  socket.on('newDrawing', (data) => {
    addLogEntry(data);
    addDrawing(data);
    playChime();
  });

  socket.on('drawingDeleted', ({ id } = {}) => {
    const idx = items.findIndex((it) => it.id === id);
    if (idx !== -1) {
      const it = items[idx];
      it.el.classList.remove('show');
      setTimeout(() => it.el.remove(), 700);
      items.splice(idx, 1);
      updateCount();
    }
    markLogEntryDeleted(id);
  });

  socket.on('drawingHighlighted', ({ id } = {}) => {
    const item = items.find((it) => it.id === id);
    if (!item) return;
    item.el.classList.add('sparkle');
    spawnSparkles(item);
    setTimeout(() => item.el.classList.remove('sparkle'), 2200);
  });

  socket.on('sessionEnded', () => {
    window.location.href = '/';
  });

  // ---- 전체화면 ----
  document.getElementById('fullscreenBtn').addEventListener('click', () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen();
    }
  });

  // ---- QR 모달 ----
  addBtn.addEventListener('click', () => {
    if (sessionInfo) {
      qrImg.src = sessionInfo.qrDataUrl;
      drawUrlText.textContent = sessionInfo.drawUrl;
    }
    modalOverlay.classList.add('show');
  });
  document.getElementById('closeModalBtn').addEventListener('click', () => {
    modalOverlay.classList.remove('show');
  });
  document.getElementById('copyLinkBtn').addEventListener('click', async () => {
    if (!sessionInfo) return;
    const btn = document.getElementById('copyLinkBtn');
    const original = btn.textContent;
    try {
      await navigator.clipboard.writeText(sessionInfo.drawUrl);
      btn.textContent = 'Copied! ✓';
    } catch (e) {
      btn.textContent = 'Copy failed';
    }
    setTimeout(() => { btn.textContent = original; }, 1500);
  });
  modalOverlay.addEventListener('click', (e) => {
    if (e.target === modalOverlay) modalOverlay.classList.remove('show');
  });

  // ---- 나가기 ----
  document.getElementById('exitBtn').addEventListener('click', () => {
    if (!confirm('End the playground and clear all drawings?')) return;
    fetch(`/api/session/${sessionId}/end`, { method: 'POST' }).finally(() => {
      window.location.href = '/';
    });
  });
</script>
</body>
</html>
