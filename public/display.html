<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Drawing Playground - Big Screen</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; }
  #stage { position: relative; width: 100%; height: 100%; overflow: hidden; transition: background 0.6s; }

  #topBar {
    position: fixed; top: 16px; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px;
    z-index: 20;
    pointer-events: none;
  }
  #titleText {
    color: rgba(255,255,255,0.92);
    font-size: clamp(18px, 2.6vw, 30px);
    font-weight: 800;
    text-shadow: 0 2px 8px rgba(0,0,0,0.35);
    pointer-events: none;
  }
  #topRightControls { display: flex; gap: 8px; pointer-events: auto; }
  #topRightControls button {
    border: none; background: rgba(0,0,0,0.35); color: #fff;
    padding: 10px 16px; border-radius: 999px; font-size: 14px; font-weight: 700;
    cursor: pointer; backdrop-filter: blur(4px);
  }
  #topRightControls button:hover { background: rgba(0,0,0,0.5); }

  #timerDisplay {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%) translateY(-140%);
    z-index: 25; background: rgba(0,0,0,0.5); color: #fff; backdrop-filter: blur(4px);
    padding: 10px 22px; border-radius: 999px; font-size: clamp(20px, 3vw, 32px);
    font-weight: 800; letter-spacing: 1px; opacity: 0; transition: transform 0.3s, opacity 0.3s;
    pointer-events: none;
  }
  #timerDisplay.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  #timerDisplay.done { background: rgba(255, 82, 82, 0.85); }

  .item {
    position: absolute; top: 0; left: 0; will-change: transform;
    filter: drop-shadow(0 6px 14px rgba(0,0,0,0.3));
    opacity: 0; transition: opacity 0.6s ease;
  }
  .item img { display: block; pointer-events: none; }
  .item.show { opacity: 1; }
  .item .label {
    position: absolute; left: 50%; bottom: -22px; transform: translateX(-50%);
    color: rgba(255,255,255,0.9); font-size: 13px; font-weight: 700;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6); white-space: nowrap;
  }
  @keyframes sparkleGlow {
    0%, 100% { filter: drop-shadow(0 6px 14px rgba(0,0,0,0.3)) drop-shadow(0 0 0 rgba(255,215,0,0)); }
    50% { filter: drop-shadow(0 6px 14px rgba(0,0,0,0.3)) drop-shadow(0 0 34px rgba(255,215,0,0.95)); }
  }
  .item.sparkle { animation: sparkleGlow 0.55s ease-in-out 4; }

  .bubble {
    position: absolute; left: 50%; bottom: 100%; transform: translateX(-50%); margin-bottom: 10px;
    background: #fff; color: #222; font-weight: 700; font-size: 14px; line-height: 1.3;
    padding: 8px 12px; border-radius: 14px; width: max-content; max-width: 180px;
    white-space: normal; word-break: break-word; text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.25);
  }
  .bubble::after {
    content: ''; position: absolute; left: 50%; top: 100%; transform: translateX(-50%);
    border: 7px solid transparent; border-top-color: #fff;
  }
  .bubble.standalone {
    position: static; transform: none; margin-bottom: 0;
    font-size: 20px; padding: 16px 20px; border-radius: 20px; max-width: 220px;
  }
  .bubble.standalone::after { display: none; }

  .deco { position: absolute; pointer-events: none; }

  #itemActionMenu {
    position: fixed; transform: translate(-50%, -110%) scale(0.9); z-index: 45;
    background: rgba(20,20,26,0.94); border-radius: 12px; padding: 6px; gap: 6px;
    display: flex; opacity: 0; transition: opacity 0.15s, transform 0.15s;
    pointer-events: none;
  }
  #itemActionMenu.show { opacity: 1; pointer-events: auto; transform: translate(-50%, -120%) scale(1); }
  #itemActionMenu button {
    border: none; background: rgba(255,255,255,0.14); color: #fff;
    width: 40px; height: 40px; border-radius: 10px; font-size: 17px; cursor: pointer;
  }
  #itemActionMenu button:hover { background: rgba(255,255,255,0.28); }

  /* 그림/말풍선 확대 보기 */
  #zoomOverlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.78); z-index: 70;
    display: none; align-items: center; justify-content: center;
  }
  #zoomOverlay.show { display: flex; }
  #zoomContent { display: flex; align-items: center; justify-content: center; }
  #zoomContent img {
    width: 80vw; height: 80vh; object-fit: contain;
    border-radius: 14px; box-shadow: 0 12px 40px rgba(0,0,0,0.55);
  }
  #zoomContent .bubble.standalone { font-size: clamp(22px, 4vw, 44px); max-width: 78vw; padding: 32px 40px; }
  #zoomCloseBtn {
    position: fixed; top: 20px; right: 20px; z-index: 71;
    width: 46px; height: 46px; border-radius: 50%; border: none;
    background: rgba(255,255,255,0.15); color: #fff; font-size: 20px; font-weight: 700; cursor: pointer;
  }
  #zoomCloseBtn:hover { background: rgba(255,255,255,0.28); }

  .shootingStar {
    position: absolute; width: 2px; height: 2px; background: #fff; border-radius: 50%;
    box-shadow: 0 0 6px 2px rgba(255,255,255,0.9); pointer-events: none;
    animation: shoot 1.1s linear forwards;
  }
  .shootingStar::after {
    content: ''; position: absolute; top: 0; left: 0; width: 90px; height: 2px;
    background: linear-gradient(90deg, rgba(255,255,255,0.85), transparent);
    transform-origin: left center; transform: rotate(215deg);
  }

  .seaweed {
    position: absolute; bottom: 0; width: 14px;
    background: linear-gradient(180deg, #35a866, #1f6b3a);
    border-radius: 40px 40px 0 0; transform-origin: bottom center;
    animation: sway 3.4s ease-in-out infinite;
  }
  @keyframes sway { 0%, 100% { transform: rotate(-6deg); } 50% { transform: rotate(6deg); } }

  .cloudWrap { position: absolute; }
  .cloudPuff {
    position: absolute; background: rgba(255,255,255,0.88); border-radius: 50%;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  }

  .treeShape {
    position: absolute; bottom: 0;
    background: linear-gradient(180deg, #357a3b, #1d4a22);
    clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
  }

  .firefly {
    position: absolute; width: 5px; height: 5px; border-radius: 50%;
    background: #fff59d; box-shadow: 0 0 8px 3px rgba(255,245,157,0.9);
    animation: fireflyGlow 2.4s ease-in-out infinite;
  }
  @keyframes fireflyGlow {
    0%, 100% { opacity: .15; transform: translateY(0); }
    50% { opacity: 1; transform: translateY(-10px); }
  }

  .confetti { position: absolute; border-radius: 2px; }
  .balloon { position: absolute; border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; }
  .balloon::after {
    content: ''; position: absolute; left: 50%; top: 100%; width: 1px; height: 24px;
    background: rgba(255,255,255,0.5); transform: translateX(-50%);
  }

  .jungleLeaf {
    position: absolute; background: radial-gradient(ellipse at center, #4caf50, #1b5e20);
    border-radius: 50%; opacity: 0.5; filter: blur(1px);
  }

  .snowHill {
    position: absolute; bottom: 0; background: #fff;
    border-radius: 50% 50% 0 0 / 100% 100% 0 0;
  }

  #addBtn {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    border: none; background: #ff5252; color: #fff;
    font-size: 18px; font-weight: 800; padding: 16px 32px; border-radius: 999px;
    cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.3); z-index: 20;
  }
  #addBtn:active { transform: translateX(-50%) scale(0.96); }

  #count {
    position: fixed; bottom: 14px; left: 20px; z-index: 20;
    color: rgba(255,255,255,0.5); font-size: 13px;
  }

  /* 오른쪽 아래 상시 노출 QR 위젯 (클릭하면 뒤집혀서 숨김) */
  #qrCorner {
    position: fixed; right: 16px; bottom: 16px; z-index: 22;
    width: 108px; height: 108px; cursor: pointer; perspective: 700px;
    transform-origin: bottom right; transition: transform 0.25s ease;
  }
  #qrCorner.zoomed { transform: scale(2); }
  #qrCornerInner {
    position: relative; width: 100%; height: 100%;
    transition: transform 0.5s; transform-style: preserve-3d;
  }
  #qrCorner.flipped #qrCornerInner { transform: rotateY(180deg); }
  #qrCornerFront, #qrCornerBack {
    position: absolute; inset: 0; backface-visibility: hidden;
    border-radius: 14px; box-shadow: 0 6px 16px rgba(0,0,0,0.35);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  #qrCornerFront { background: #fff; gap: 2px; }
  #qrCornerFront img { width: 78px; height: 78px; }
  #qrCornerFront span { font-size: 10px; font-weight: 800; color: #333; }
  #qrCornerBack {
    background: rgba(0,0,0,0.6); backdrop-filter: blur(3px); color: #fff;
    transform: rotateY(180deg); font-size: 11px; font-weight: 700; text-align: center; padding: 8px;
  }
  #qrZoomBtn {
    position: absolute; top: 0; left: 0; z-index: 3;
    width: 0; height: 0; cursor: pointer;
    border-style: solid; border-width: 20px 20px 0 0;
    border-color: #ff5252 transparent transparent transparent;
    border-top-left-radius: 14px;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.35));
  }
  #qrCorner.flipped #qrZoomBtn { display: none; }

  /* 연결 상태 배너 */
  #connStatus {
    position: fixed; top: 0; left: 0; right: 0; text-align: center;
    padding: 8px; font-size: 13px; font-weight: 700; color: #fff;
    transform: translateY(-100%); transition: transform 0.25s; z-index: 60;
  }
  #connStatus.show { transform: translateY(0); }
  #connStatus.warn { background: #d32f2f; }
  #connStatus.ok { background: #2e7d32; }

  /* 제출 로그 패널 */
  #logTab {
    position: fixed; top: 50%; right: 0; transform: translateY(-50%);
    z-index: 40; border: none; background: rgba(0,0,0,0.4); color: #fff;
    padding: 14px 8px; border-radius: 12px 0 0 12px; cursor: pointer;
    font-size: 13px; font-weight: 700; writing-mode: vertical-rl; text-orientation: mixed;
    transition: transform 0.3s ease;
  }
  #logPanel {
    position: fixed; top: 0; right: 0; bottom: 0; width: min(320px, 82vw);
    background: rgba(20,20,26,0.94); color: #fff; z-index: 39;
    transform: translateX(100%); transition: transform 0.3s ease;
    display: flex; flex-direction: column; backdrop-filter: blur(6px);
  }
  #logPanel.open { transform: translateX(0); }
  #logHeader {
    padding: 18px 16px 10px; font-weight: 800; font-size: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.15); flex-shrink: 0;
  }
  #logStats {
    margin-top: 4px; font-weight: 500; font-size: 12px; color: rgba(255,255,255,0.6);
  }
  #logList { flex: 1; overflow-y: auto; padding: 8px 10px; }
  .logEntry {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    padding: 10px 8px; border-radius: 10px; margin-bottom: 4px;
  }
  .logEntry:hover { background: rgba(255,255,255,0.06); }
  .logEntry.deleted { opacity: 0.4; }
  .logInfo { min-width: 0; }
  .logName { font-weight: 700; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .logMessage { font-size: 12px; font-style: italic; color: rgba(255,255,255,0.75); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .logTime { font-size: 12px; color: rgba(255,255,255,0.55); }
  .logActions { display: flex; gap: 4px; flex-shrink: 0; }
  .logBtn {
    border: none; background: rgba(255,255,255,0.1); color: #fff;
    width: 30px; height: 30px; border-radius: 8px; cursor: pointer; font-size: 14px;
  }
  .logBtn:hover:not(:disabled) { background: rgba(255,255,255,0.22); }
  .logBtn:disabled { opacity: 0.3; cursor: default; }
  #logEmpty { padding: 20px 8px; color: rgba(255,255,255,0.5); font-size: 13px; text-align: center; }
  #logFooter {
    flex-shrink: 0; display: flex; gap: 8px; padding: 10px;
    border-top: 1px solid rgba(255,255,255,0.15);
  }
  #logFooter button {
    flex: 1; border: none; border-radius: 10px; padding: 10px 8px;
    font-size: 13px; font-weight: 700; cursor: pointer; color: #fff;
  }
  #pauseBtn { background: rgba(255,255,255,0.12); }
  #pauseBtn.paused { background: #ffb300; color: #221; }
  #clearAllBtn { background: rgba(255,82,82,0.25); }
  #clearAllBtn:hover { background: rgba(255,82,82,0.4); }

  /* QR 모달 */
  #modalOverlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55);
    display: none; align-items: center; justify-content: center; z-index: 50;
  }
  #modalOverlay.show { display: flex; }
  #modalBox {
    background: #fff; border-radius: 24px; padding: 36px 44px;
    text-align: center; max-width: 90vw;
  }
  #modalBox h2 { font-size: 22px; margin-bottom: 6px; color: #222; }
  #modalBox p { color: #777; font-size: 14px; margin-bottom: 18px; }
  #qrImg { width: 260px; height: 260px; border-radius: 12px; }
  #drawUrlText {
    margin-top: 14px; font-size: 13px; color: #999; word-break: break-all;
  }
  #modalButtons { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
  #copyLinkBtn, #closeModalBtn {
    border: none; color: #333;
    padding: 10px 24px; border-radius: 999px; font-weight: 700; cursor: pointer;
  }
  #copyLinkBtn { background: #eef0ff; color: #3f3fbf; }
  #closeModalBtn { background: #eee; }

  #loadingMsg, #errorBox {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px; color: #fff; background: #111; z-index: 100;
  }
  #errorBox { display: none; }
  #errorBox a {
    color: #fff; background: #ff5252; padding: 12px 26px; border-radius: 999px;
    text-decoration: none; font-weight: 700;
  }
</style>
</head>
<body>
<div id="connStatus"></div>
<div id="loadingMsg">Loading...</div>
<div id="errorBox">
  <div>This playground couldn't be found. (It may have ended, or the address is wrong.)</div>
  <a href="/">Back to Home</a>
</div>

<div id="stage" style="display:none;">
  <div id="topBar">
    <div id="titleText"></div>
    <div id="topRightControls">
      <button id="saveImageBtn" title="Save as photo">📸</button>
      <button id="muteBtn" title="Toggle sound"></button>
      <button id="timerBtn" title="Countdown timer">⏱</button>
      <button id="fullscreenBtn" title="Fullscreen">⛶</button>
      <button id="exitBtn">Exit ✕</button>
    </div>
  </div>
  <div id="timerDisplay"></div>
  <div id="count"></div>
</div>

<button id="addBtn" style="display:none;">➕ Add a Drawing</button>

<div id="qrCorner" style="display:none;" title="Click to hide/show the QR code">
  <div id="qrZoomBtn" title="Enlarge QR code"></div>
  <div id="qrCornerInner">
    <div id="qrCornerFront">
      <img id="qrCornerImg" src="" alt="QR code" />
      <span>Scan to draw</span>
    </div>
    <div id="qrCornerBack">QR hidden<br />Tap to show</div>
  </div>
</div>

<button id="logTab">Log (<span id="logCount">0</span>)</button>
<div id="logPanel">
  <div id="logHeader">
    Submissions
    <div id="logStats"></div>
  </div>
  <div id="logList"></div>
  <div id="logFooter">
    <button id="pauseBtn">⏸ Pause</button>
    <button id="clearAllBtn">🗑️ Clear All</button>
  </div>
</div>

<div id="modalOverlay">
  <div id="modalBox">
    <h2>📱 Scan the QR with a tablet</h2>
    <p>Scanning takes you straight to the drawing screen</p>
    <img id="qrImg" src="" alt="QR code" />
    <div id="drawUrlText"></div>
    <div id="modalButtons">
      <button id="copyLinkBtn">Copy Link</button>
      <button id="closeModalBtn">Close</button>
    </div>
  </div>
</div>

<div id="zoomOverlay">
  <button id="zoomCloseBtn" title="Close">✕</button>
  <div id="zoomContent"></div>
</div>

<script src="/themes.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script>
  const sessionId = location.pathname.split('/').filter(Boolean).pop();
  const socket = io();

  const stage = document.getElementById('stage');
  const loadingMsg = document.getElementById('loadingMsg');
  const errorBox = document.getElementById('errorBox');
  const addBtn = document.getElementById('addBtn');
  const qrCorner = document.getElementById('qrCorner');
  const qrCornerImg = document.getElementById('qrCornerImg');
  const countEl = document.getElementById('count');
  const titleText = document.getElementById('titleText');
  const modalOverlay = document.getElementById('modalOverlay');
  const qrImg = document.getElementById('qrImg');
  const drawUrlText = document.getElementById('drawUrlText');
  const connStatus = document.getElementById('connStatus');
  const logTab = document.getElementById('logTab');
  const logPanel = document.getElementById('logPanel');
  const logList = document.getElementById('logList');
  const logCountEl = document.getElementById('logCount');
  const logStatsEl = document.getElementById('logStats');
  const muteBtn = document.getElementById('muteBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const clearAllBtn = document.getElementById('clearAllBtn');

  const MAX_ITEMS = 35;
  const MAX_DIM = 220;
  const MIN_DIM = 90;
  const LOG_LIMIT = 300;
  const items = [];
  const logEntries = [];
  let theme = 'ocean';

  function rand(min, max) { return Math.random() * (max - min) + min; }

  // ---- 연결 상태 표시 ----
  let everConnected = false;
  socket.on('connect', () => {
    if (everConnected) {
      connStatus.textContent = 'Reconnected ✓';
      connStatus.className = 'show ok';
      setTimeout(() => connStatus.classList.remove('show'), 2000);
    }
    everConnected = true;
  });
  socket.on('disconnect', () => {
    connStatus.textContent = 'Connection lost — retrying…';
    connStatus.className = 'show warn';
  });

  // ---- 효과음 (외부 파일 없이 WebAudio로 생성) ----
  let audioCtx = null;
  let muted = localStorage.getItem('drawingWallMuted') === '1';
  function updateMuteBtn() { muteBtn.textContent = muted ? '🔇' : '🔊'; }
  updateMuteBtn();
  muteBtn.addEventListener('click', () => {
    muted = !muted;
    localStorage.setItem('drawingWallMuted', muted ? '1' : '0');
    updateMuteBtn();
  });
  document.addEventListener('click', function unlockAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    } else if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }, { once: true });

  function playChime() {
    if (muted) return;
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const t0 = audioCtx.currentTime;
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(880, t0);
      o.frequency.exponentialRampToValueAtTime(1320, t0 + 0.12);
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(0.15, t0 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.4);
      o.connect(g);
      g.connect(audioCtx.destination);
      o.start(t0);
      o.stop(t0 + 0.4);
    } catch (e) {}
  }

  // ---- 세션 정보 불러오기 ----
  let sessionInfo = null;
  fetch(`/api/session/${sessionId}`)
    .then((r) => { if (!r.ok) throw new Error('not_found'); return r.json(); })
    .then((data) => {
      sessionInfo = data;
      theme = data.theme;
      init();
    })
    .catch(() => {
      loadingMsg.style.display = 'none';
      errorBox.style.display = 'flex';
    });

  function init() {
    loadingMsg.style.display = 'none';
    stage.style.display = 'block';
    addBtn.style.display = 'block';
    qrCornerImg.src = sessionInfo.qrDataUrl;
    qrCorner.style.display = 'block';

    const t = THEMES[theme] || THEMES.ocean;
    if (theme === 'custom' && sessionInfo.customBackground) {
      stage.style.background = `#222 url(${sessionInfo.customBackground}) center / cover no-repeat`;
    } else {
      stage.style.background = t.bgGradient;
      createDecorations(theme);
    }
    titleText.textContent = sessionInfo.title || '';
    updatePauseBtn(!!sessionInfo.paused);

    socket.emit('joinSession', { sessionId, role: 'display' });
    requestAnimationFrame(tick);
  }

  // ---- 배경 장식 (테마별) ----
  function scheduleRepeating(fn, minMs, maxMs) {
    (function loop() {
      setTimeout(() => { fn(); loop(); }, rand(minMs, maxMs));
    })();
  }

  function createDecorations(theme) {
    if (theme === 'space') {
      for (let i = 0; i < 90; i++) {
        const s = document.createElement('div');
        s.className = 'deco';
        const size = rand(1, 3);
        s.style.width = size + 'px';
        s.style.height = size + 'px';
        s.style.left = rand(0, 100) + '%';
        s.style.top = rand(0, 100) + '%';
        s.style.background = '#fff';
        s.style.borderRadius = '50%';
        s.style.opacity = rand(0.2, 0.9);
        s.style.animation = `twinkle ${rand(2, 4)}s ease-in-out ${rand(0, 3)}s infinite`;
        stage.appendChild(s);
      }
      injectKeyframes('@keyframes twinkle {0%,100%{opacity:.15}50%{opacity:.9}}');

      const moon = document.createElement('div');
      moon.className = 'deco';
      moon.style.cssText = `top:8%; right:9%; width:76px; height:76px; border-radius:50%;
        background:radial-gradient(circle at 35% 35%, #fff, #d7dae6 60%, #9aa0b5 100%);
        box-shadow:0 0 46px rgba(255,255,255,0.45), inset -12px -12px 18px rgba(0,0,0,0.18);`;
      stage.appendChild(moon);

      const planetStyles = [
        'background:radial-gradient(circle at 35% 35%, #ffab91, #bf360c);',

  function injectKeyframes(rule) {
    const styleEl = document.createElement('style');
    styleEl.textContent = rule;
    document.head.appendChild(styleEl);
  }

  // ---- 화면에서 그림을 직접 클릭했을 때 삭제/반짝임 메뉴 ----
  function removeItemActionMenu() {
    const existing = document.getElementById('itemActionMenu');
    if (existing) existing.remove();
  }

  function showItemActionMenu(drawingId, clickX, clickY) {
    removeItemActionMenu();
    const menu = document.createElement('div');
    menu.id = 'itemActionMenu';
    menu.style.left = clickX + 'px';
    menu.style.top = clickY + 'px';

    const zoomBtn = document.createElement('button');
    zoomBtn.title = 'Enlarge';
    zoomBtn.textContent = '🔍';
    zoomBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      showZoomedItem(drawingId);
      removeItemActionMenu();
    });
    menu.appendChild(zoomBtn);

    const sparkleBtn = document.createElement('button');
    sparkleBtn.title = 'Highlight';
    sparkleBtn.textContent = '✨';
    sparkleBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      socket.emit('adminHighlightDrawing', { drawingId });
      removeItemActionMenu();
    });

    const deleteBtn = document.createElement('button');
    deleteBtn.title = 'Delete';
    deleteBtn.textContent = '🗑️';
    deleteBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      socket.emit('adminDeleteDrawing', { drawingId });
      removeItemActionMenu();
    });

    menu.appendChild(sparkleBtn);
    menu.appendChild(deleteBtn);
    stage.appendChild(menu);
    requestAnimationFrame(() => menu.classList.add('show'));

    setTimeout(() => {
      document.addEventListener('click', removeItemActionMenu, { once: true });
    }, 0);
  }

  // ---- 그림/말풍선 크게 보기 ----
  const zoomOverlay = document.getElementById('zoomOverlay');
  const zoomContent = document.getElementById('zoomContent');

  function showZoomedItem(drawingId) {
    const item = items.find((it) => it.id === drawingId);
    if (!item) return;
    zoomContent.innerHTML = '';
    const img = item.el.querySelector('img');
    if (img && img.src) {
      const bigImg = document.createElement('img');
      bigImg.src = img.src;
      zoomContent.appendChild(bigImg);
    } else {
      const bubble = item.el.querySelector('.bubble');
      zoomContent.appendChild(createBubble(bubble ? bubble.textContent : '', true));
    }
    zoomOverlay.classList.add('show');
  }

  function closeZoomedItem() {
    zoomOverlay.classList.remove('show');
  }

  document.getElementById('zoomCloseBtn').addEventListener('click', closeZoomedItem);
  zoomOverlay.addEventListener('click', (e) => {
    if (e.target === zoomOverlay) closeZoomedItem();
  });

  // ---- 그림/말풍선 추가 ----
  function createBubble(text, standalone) {
    const bubble = document.createElement('div');
    bubble.className = 'bubble' + (standalone ? ' standalone' : '');
    bubble.textContent = text;
    return bubble;
  }

  function finalizeItem(el, w, h, id) {
    el.style.cursor = 'pointer';
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      showItemActionMenu(id, e.clientX, e.clientY);
    });

    const stageW = stage.clientWidth;
    const stageH = stage.clientHeight;
    const x = rand(0, Math.max(0, stageW - w));
    const y = rand(0, Math.max(0, stageH - h));
    const speed = rand(35, 75);
    const angle = rand(0, Math.PI * 2);

    const item = {
      id, el, w, h, x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      bob: rand(0, Math.PI * 2),
      rotSpeed: rand(-6, 6)
    };
    items.push(item);
    requestAnimationFrame(() => el.classList.add('show'));

    while (items.length > MAX_ITEMS) {
      const old = items.shift();
      old.el.classList.remove('show');
      setTimeout(() => old.el.remove(), 700);
    }
    updateCount();
  }

  function addDrawing(data) {
    if (data.image) {
      const img = new Image();
      img.onload = () => {
        let w = img.naturalWidth;
        let h = img.naturalHeight;
        const scale = Math.min(MAX_DIM / Math.max(w, h), 1);
        w = Math.max(MIN_DIM, w * scale);
        h = Math.max(MIN_DIM, h * (w / img.naturalWidth));
        if (h > MAX_DIM) { const s2 = MAX_DIM / h; w *= s2; h *= s2; }

        const el = document.createElement('div');
        el.className = 'item';
        el.dataset.id = data.id;
        el.style.width = w + 'px';
        el.style.height = h + 'px';
        el.appendChild(img);
        img.style.width = '100%';
        img.style.height = '100%';

        if (data.message) el.appendChild(createBubble(data.message, false));
        if (data.name) {
          const label = document.createElement('div');
          label.className = 'label';
          label.textContent = data.name;
          el.appendChild(label);
        }
        stage.appendChild(el);
        finalizeItem(el, w, h, data.id);
      };
      img.src = data.image;
    } else if (data.message) {
      const el = document.createElement('div');
      el.className = 'item';
      el.dataset.id = data.id;
      const bubble = createBubble(data.message, true);
      el.appendChild(bubble);
      if (data.name) {
        const label = document.createElement('div');
        label.className = 'label';
        label.textContent = data.name;
        el.appendChild(label);
      }
      stage.appendChild(el);
      const rect = bubble.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;
      el.style.width = w + 'px';
      el.style.height = h + 'px';
      finalizeItem(el, w, h, data.id);
    }
  }

  function updateCount() {
    countEl.textContent = items.length > 0 ? `${items.length} drawings playing` : '';
  }

  // ---- 제출 로그 ----
  function formatTime(ts) {
    const d = new Date(ts);
    const pad = (n) => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }

  function renderLogEntry(entry) {
    const row = document.createElement('div');
    row.className = 'logEntry' + (entry.deleted ? ' deleted' : '');
    row.dataset.id = entry.id;

    const info = document.createElement('div');
    info.className = 'logInfo';
    const nameEl = document.createElement('div');
    nameEl.className = 'logName';
    nameEl.textContent = entry.name || 'Anonymous';
    const timeEl = document.createElement('div');
    timeEl.className = 'logTime';
    timeEl.textContent = formatTime(entry.createdAt);
    info.appendChild(nameEl);
    if (entry.message) {
      const msgEl = document.createElement('div');
      msgEl.className = 'logMessage';
      msgEl.textContent = `"${entry.message}"`;
      info.appendChild(msgEl);
    }
    info.appendChild(timeEl);

    const actions = document.createElement('div');
    actions.className = 'logActions';
    const sparkleBtn = document.createElement('button');
    sparkleBtn.className = 'logBtn';
    sparkleBtn.title = 'Highlight';
    sparkleBtn.textContent = '✨';
    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'logBtn';
    deleteBtn.title = 'Delete';
    deleteBtn.textContent = '🗑️';

    if (entry.deleted) {
      sparkleBtn.disabled = true;
      deleteBtn.disabled = true;
    } else {
      deleteBtn.addEventListener('click', () => socket.emit('adminDeleteDrawing', { drawingId: entry.id }));
      sparkleBtn.addEventListener('click', () => socket.emit('adminHighlightDrawing', { drawingId: entry.id }));
    }
    actions.appendChild(sparkleBtn);
    actions.appendChild(deleteBtn);

    row.appendChild(info);
    row.appendChild(actions);
    return row;
  }

  function updateLogStats() {
    const uniqueNames = new Set(logEntries.filter((e) => e.name).map((e) => e.name));
    logStatsEl.textContent = `${logEntries.length} submission${logEntries.length === 1 ? '' : 's'} · ${uniqueNames.size} named participant${uniqueNames.size === 1 ? '' : 's'}`;
  }

  function addLogEntry(data) {
    const entry = { id: data.id, name: data.name, message: data.message, createdAt: data.createdAt || Date.now(), deleted: false };
    logEntries.unshift(entry);
    if (logEntries.length > LOG_LIMIT) logEntries.pop();
    logList.insertBefore(renderLogEntry(entry), logList.firstChild);
    while (logList.children.length > LOG_LIMIT) logList.removeChild(logList.lastChild);
    logCountEl.textContent = logEntries.length;
    updateLogStats();
  }

  function markLogEntryDeleted(id) {
    const entry = logEntries.find((e) => e.id === id);
    if (entry) entry.deleted = true;
    const row = logList.querySelector(`[data-id="${CSS.escape(id)}"]`);
    if (row) {
      row.classList.add('deleted');
      row.querySelectorAll('button').forEach((b) => (b.disabled = true));
    }
  }

  function openLogPanel() {
    logPanel.classList.add('open');
    const w = logPanel.getBoundingClientRect().width;
    logTab.style.transform = `translateY(-50%) translateX(-${w}px)`;
  }

  function closeLogPanel() {
    logPanel.classList.remove('open');
    logTab.style.transform = '';
  }

  logTab.addEventListener('click', (e) => {
    e.stopPropagation();
    if (logPanel.classList.contains('open')) closeLogPanel();
    else openLogPanel();
  });

  // 로그 패널이 열려 있을 때 패널/탭 바깥을 클릭하면 닫기
  // 캡처 단계에서 검사해서, 그림 클릭처럼 버블링을 막는 핸들러가 있어도 항상 감지되게 함
  document.addEventListener('click', (e) => {
    if (!logPanel.classList.contains('open')) return;
    if (logPanel.contains(e.target) || logTab.contains(e.target)) return;
    closeLogPanel();
  }, true);

  // ---- 일시정지 / 전체 지우기 ----
  let isPaused = false;
  function updatePauseBtn(paused) {
    isPaused = paused;
    pauseBtn.textContent = paused ? '▶ Resume' : '⏸ Pause';
    pauseBtn.classList.toggle('paused', paused);
  }
  pauseBtn.addEventListener('click', () => {
    socket.emit('adminSetPaused', { paused: !isPaused });
  });
  socket.on('pausedStateChanged', ({ paused }) => updatePauseBtn(!!paused));

  clearAllBtn.addEventListener('click', () => {
    if (items.length === 0) return;
    if (!confirm(`Clear all ${items.length} drawings from the screen?`)) return;
    items.slice().forEach((item) => socket.emit('adminDeleteDrawing', { drawingId: item.id }));
  });

  // ---- 반짝임 강조 파티클 ----
  function spawnSparkles(item) {
    for (let i = 0; i < 6; i++) {
      const s = document.createElement('div');
      s.textContent = '✨';
      s.style.position = 'absolute';
      s.style.left = (item.x + item.w / 2) + 'px';
      s.style.top = (item.y + item.h / 2) + 'px';
      s.style.fontSize = (16 + Math.random() * 14) + 'px';
      s.style.pointerEvents = 'none';
      s.style.zIndex = '15';
      s.style.transition = 'transform 0.9s ease-out, opacity 0.9s ease-out';
      s.style.opacity = '1';
      stage.appendChild(s);
      const angle = Math.random() * Math.PI * 2;
      const dist = 40 + Math.random() * 50;
      requestAnimationFrame(() => {
        s.style.transform = `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px)`;
        s.style.opacity = '0';
      });
      setTimeout(() => s.remove(), 950);
    }
  }

  // ---- 물리 애니메이션 (테마별로 살짝 다른 느낌) ----
  let lastTime = performance.now();
  function tick(now) {
    const dt = Math.min(0.05, (now - lastTime) / 1000);
    lastTime = now;
    const stageW = stage.clientWidth;
    const stageH = stage.clientHeight;

    for (const item of items) {
      item.x += item.vx * dt;
      item.bob += dt;

      let yDrift = item.vy * dt;
      if (theme === 'ocean') {
        // 물고기처럼: 좌우 위주로 움직이고 위아래로 살짝 헤엄치듯 흔들림
        yDrift += Math.sin(item.bob * 2) * 8 * dt;
      } else if (theme === 'sky') {
        // 풍선처럼: 천천히 위로 뜨는 느낌 + 좌우 흔들림
        yDrift -= 6 * dt;
        item.x += Math.sin(item.bob) * 6 * dt;
      }
      item.y += yDrift;

      if (item.x <= 0) { item.x = 0; item.vx = Math.abs(item.vx); }
      if (item.x + item.w >= stageW) { item.x = stageW - item.w; item.vx = -Math.abs(item.vx); }
      if (item.y <= 0) { item.y = 0; item.vy = Math.abs(item.vy); }
      if (item.y + item.h >= stageH) { item.y = stageH - item.h; item.vy = -Math.abs(item.vy); }

      const wobble = Math.sin(item.bob * (item.rotSpeed / 3 || 1)) * 6;
      item.el.style.transform = `translate(${item.x}px, ${item.y}px) rotate(${wobble}deg)`;
    }
    requestAnimationFrame(tick);
  }

  socket.on('newDrawing', (data) => {
    addLogEntry(data);
    addDrawing(data);
    playChime();
  });

  socket.on('drawingDeleted', ({ id } = {}) => {
    const idx = items.findIndex((it) => it.id === id);
    if (idx !== -1) {
      const it = items[idx];
      it.el.classList.remove('show');
      setTimeout(() => it.el.remove(), 700);
      items.splice(idx, 1);
      updateCount();
    }
    markLogEntryDeleted(id);
  });

  socket.on('drawingHighlighted', ({ id } = {}) => {
    const item = items.find((it) => it.id === id);
    if (!item) return;
    item.el.classList.add('sparkle');
    spawnSparkles(item);
    setTimeout(() => item.el.classList.remove('sparkle'), 2200);
  });

  socket.on('sessionEnded', () => {
    window.location.href = '/';
  });

  // ---- 사진으로 저장 (추억용 콜라주) ----
  function wrapCanvasText(ctx, text, cx, cy, maxWidth, lineHeight) {
    const words = text.split(' ');
    const lines = [];
    let line = '';
    for (const word of words) {
      const test = line ? line + ' ' + word : word;
      if (line && ctx.measureText(test).width > maxWidth) {
        lines.push(line);
        line = word;
      } else {
        line = test;
      }
    }
    if (line) lines.push(line);
    const startY = cy - ((lines.length - 1) * lineHeight) / 2;
    lines.forEach((l, i) => ctx.fillText(l, cx, startY + i * lineHeight));
  }

  function drawBubbleToCanvas(ctx, item) {
    const bubble = item.el.querySelector('.bubble');
    const text = bubble ? bubble.textContent : '';
    const { x, y, w, h } = item;
    const r = 16;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#222';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    wrapCanvasText(ctx, text, x + w / 2, y + h / 2, w - 20, 20);
  }

  function fillThemeBackground(ctx, stageW, stageH, t) {
    const stops = t.gradientStops;
    if (!stops) {
      ctx.fillStyle = t.accent || '#4fb7e8';
      ctx.fillRect(0, 0, stageW, stageH);
      return;
    }
    let grad;
    if (t.gradientType === 'radial') {
      grad = ctx.createRadialGradient(stageW / 2, 0, 0, stageW / 2, 0, Math.max(stageW, stageH));
    } else {
      grad = ctx.createLinearGradient(0, 0, 0, stageH);
    }
    stops.forEach(([offset, color]) => grad.addColorStop(offset, color));
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, stageW, stageH);
  }

  function drawImageCover(ctx, img, x, y, w, h) {
    const imgRatio = img.naturalWidth / img.naturalHeight;
    const boxRatio = w / h;
    let sx, sy, sw, sh;
    if (imgRatio > boxRatio) {
      sh = img.naturalHeight;
      sw = sh * boxRatio;
      sx = (img.naturalWidth - sw) / 2;
      sy = 0;
    } else {
      sw = img.naturalWidth;
      sh = sw / boxRatio;
      sx = 0;
      sy = (img.naturalHeight - sh) / 2;
    }
    ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
  }

  function drawOverlayText(ctx, stageW, stageH) {
    ctx.shadowColor = 'rgba(0,0,0,0.45)';

    if (sessionInfo && sessionInfo.title) {
      ctx.font = '800 26px sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      ctx.shadowBlur = 8;
      ctx.fillText(sessionInfo.title, 20, 16);
    }

    ctx.font = '700 14px sans-serif';
    ctx.textBaseline = 'bottom';
    ctx.shadowBlur = 4;

    ctx.textAlign = 'left';
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillText(`${items.length} drawing${items.length === 1 ? '' : 's'}`, 20, stageH - 14);

    const ts = new Date().toLocaleString([], {
      year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit'
    });
    ctx.textAlign = 'right';
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillText(ts, stageW - 20, stageH - 14);

    ctx.shadowBlur = 0;
  }

  function drawItemsOnCanvas(ctx) {
    items.forEach((item) => {
      const img = item.el.querySelector('img');
      if (img && img.complete && img.naturalWidth > 0) {
        ctx.drawImage(img, item.x, item.y, item.w, item.h);
      } else {
        drawBubbleToCanvas(ctx, item);
      }
      const label = item.el.querySelector('.label');
      if (label && label.textContent) {
        ctx.font = 'bold 13px sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.95)';
        ctx.textAlign = 'center';
        ctx.shadowColor = 'rgba(0,0,0,0.6)';
        ctx.shadowBlur = 3;
        ctx.fillText(label.textContent, item.x + item.w / 2, item.y + item.h + 16);
        ctx.shadowBlur = 0;
      }
    });
  }

  function downloadCanvas(canvas) {
    const link = document.createElement('a');
    link.download = `drawing-playground-${Date.now()}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  }

  function saveStageAsImage() {
    const stageW = stage.clientWidth;
    const stageH = stage.clientHeight;
    const canvas = document.createElement('canvas');
    canvas.width = stageW;
    canvas.height = stageH;
    const ctx = canvas.getContext('2d');

    function finish() {
      drawItemsOnCanvas(ctx);
      drawOverlayText(ctx, stageW, stageH);
      downloadCanvas(canvas);
    }

    if (theme === 'custom' && sessionInfo && sessionInfo.customBackground) {
      const bgImg = new Image();
      bgImg.onload = () => { drawImageCover(ctx, bgImg, 0, 0, stageW, stageH); finish(); };
      bgImg.onerror = () => { ctx.fillStyle = '#333'; ctx.fillRect(0, 0, stageW, stageH); finish(); };
      bgImg.src = sessionInfo.customBackground;
    } else {
      fillThemeBackground(ctx, stageW, stageH, THEMES[theme] || THEMES.ocean);
      finish();
    }
  }

  document.getElementById('saveImageBtn').addEventListener('click', saveStageAsImage);

  // ---- 전체화면 ----
  document.getElementById('fullscreenBtn').addEventListener('click', () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen();
    }
  });

  // ---- 카운트다운 타이머 (호스트 화면 로컬 전용, 서버 동기화 없음) ----
  const timerBtn = document.getElementById('timerBtn');
  const timerDisplay = document.getElementById('timerDisplay');
  let timerInterval = null;

  function formatTimer(totalSeconds) {
    const m = Math.floor(totalSeconds / 60);
    const s = totalSeconds % 60;
    return `${m}:${String(s).padStart(2, '0')}`;
  }

  function stopTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
    timerDisplay.classList.remove('show', 'done');
  }

  function startTimer(minutes) {
    clearInterval(timerInterval);
    let remaining = Math.round(minutes * 60);
    timerDisplay.classList.remove('done');
    timerDisplay.textContent = formatTimer(remaining);
    timerDisplay.classList.add('show');
    timerInterval = setInterval(() => {
      remaining--;
      if (remaining <= 0) {
        clearInterval(timerInterval);
        timerInterval = null;
        timerDisplay.textContent = "Time's up! ⏰";
        timerDisplay.classList.add('done');
        playChime();
        setTimeout(() => timerDisplay.classList.remove('show'), 6000);
        return;
      }
      timerDisplay.textContent = formatTimer(remaining);
    }, 1000);
  }

  timerBtn.addEventListener('click', () => {
    if (timerInterval) {
      if (confirm('Stop the timer?')) stopTimer();
      return;
    }
    const input = prompt('Set a countdown timer (minutes):', '5');
    if (input === null) return;
    const minutes = parseFloat(input);
    if (!minutes || minutes <= 0) return;
    startTimer(minutes);
  });

  // ---- QR 모달 ----
  addBtn.addEventListener('click', () => {
    if (sessionInfo) {
      qrImg.src = sessionInfo.qrDataUrl;
      drawUrlText.textContent = sessionInfo.drawUrl;
    }
    modalOverlay.classList.add('show');
  });
  document.getElementById('closeModalBtn').addEventListener('click', () => {
    modalOverlay.classList.remove('show');
  });
  document.getElementById('copyLinkBtn').addEventListener('click', async () => {
    if (!sessionInfo) return;
    const btn = document.getElementById('copyLinkBtn');
    const original = btn.textContent;
    try {
      await navigator.clipboard.writeText(sessionInfo.drawUrl);
      btn.textContent = 'Copied! ✓';
    } catch (e) {
      btn.textContent = 'Copy failed';
    }
    setTimeout(() => { btn.textContent = original; }, 1500);
  });
  modalOverlay.addEventListener('click', (e) => {
    if (e.target === modalOverlay) modalOverlay.classList.remove('show');
  });

  // ---- 오른쪽 아래 상시 QR 위젯 (클릭하면 뒤집혀서 숨김/표시) ----
  qrCorner.addEventListener('click', () => {
    qrCorner.classList.toggle('flipped');
    if (qrCorner.classList.contains('flipped')) qrCorner.classList.remove('zoomed');
  });
  document.getElementById('qrZoomBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    qrCorner.classList.toggle('zoomed');
  });

  // ---- 나가기 ----
  document.getElementById('exitBtn').addEventListener('click', () => {
    if (!confirm('End the playground and clear all drawings?')) return;
    fetch(`/api/session/${sessionId}/end`, { method: 'POST' }).finally(() => {
      window.location.href = '/';
    });
  });
</script>
</body>
</html>
