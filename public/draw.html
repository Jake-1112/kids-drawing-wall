<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Draw</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    overflow: hidden; background: #fafafa;
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    touch-action: none;
  }
  #app { display: none; flex-direction: column; height: 100%; }
  #app.ready { display: flex; }

  #themeBar {
    flex-shrink: 0; padding: 10px 14px; color: #fff; font-weight: 800; font-size: 14px;
    display: flex; align-items: center; gap: 8px;
  }

  #canvasWrap {
    flex: 1; position: relative; background: #ffffff;
    background-image:
      linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px),
      linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px);
    background-size: 24px 24px;
  }
  #canvas { position: absolute; top: 0; left: 0; touch-action: none; }

  #toolbar { flex-shrink: 0; display: flex; align-items: center; gap: 8px; padding: 10px; background: #222; overflow-x: auto; }
  .colorBtn { width: 38px; height: 38px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.15); flex-shrink: 0; cursor: pointer; }
  .colorBtn.active { border-color: #fff; transform: scale(1.1); }
  .sizeBtn { width: 38px; height: 38px; border-radius: 50%; background: #444; border: 2px solid transparent; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; }
  .sizeBtn.active { border-color: #fff; }
  .sizeBtn span { background: #fff; border-radius: 50%; display: block; }
  .iconBtn {
    flex-shrink: 0; width: 38px; height: 38px; border-radius: 10px; border: none;
    background: #444; color: #fff; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  #actionBar { flex-shrink: 0; display: flex; align-items: stretch; gap: 8px; padding: 10px; background: #1a1a1a; }
  .actionBtn { border: none; border-radius: 10px; padding: 10px 14px; font-size: 15px; font-weight: 700; cursor: pointer; }
  .actionBtn:disabled { opacity: 0.35; cursor: default; }
  #undoBtn { background: #555; color: #fff; flex: 0 0 auto; }
  #clearBtn { background: #555; color: #fff; flex: 1 1 auto; }
  #sendBtn { background: #ff5252; color: #fff; font-size: 17px; padding: 10px 18px; flex: 1.4 1 auto; }

  #nameBar { flex-shrink: 0; display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: #333; overflow-x: auto; }
  #nameInput { flex: 1 1 80px; min-width: 0; border: none; border-radius: 8px; padding: 8px 10px; font-size: 15px; outline: none; }
  #nameBar label { color: #ccc; font-size: 13px; flex-shrink: 0; }
  #nameBar .iconBtn { flex-shrink: 0; }

  #messageBar { flex-shrink: 0; display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: #3a3a3a; overflow-x: auto; }
  #messageInput { flex: 1 1 80px; min-width: 0; border: none; border-radius: 8px; padding: 8px 10px; font-size: 15px; outline: none; }
  #messageBar label { color: #ccc; font-size: 13px; flex-shrink: 0; }

  #toast {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
    background: rgba(0,0,0,0.8); color: #fff; padding: 20px 30px; border-radius: 16px;
    font-size: 22px; font-weight: 700; opacity: 0; pointer-events: none;
    transition: opacity 0.25s, transform 0.25s; z-index: 10; text-align: center;
  }
  #toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

  #connStatus {
    position: fixed; top: 0; left: 0; right: 0; text-align: center;
    padding: 8px; font-size: 13px; font-weight: 700; color: #fff;
    transform: translateY(-100%); transition: transform 0.25s; z-index: 30;
  }
  #connStatus.show { transform: translateY(0); }
  #connStatus.warn { background: #d32f2f; }
  #connStatus.ok { background: #2e7d32; }

  #loadingMsg, #errorBox {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px; color: #fff; background: #111; text-align: center; padding: 20px;
  }
  #errorBox { display: none; }
  #errorBox div.big { font-size: 40px; }
</style>
</head>
<body>
<div id="connStatus"></div>
<div id="loadingMsg">Loading...</div>
<div id="errorBox">
  <div class="big">🙈</div>
  <div>This playground has ended or doesn't exist.</div>
  <div style="font-size:13px;color:#aaa;">Ask the host for a new QR code.</div>
</div>

<div id="app">
  <div id="themeBar"><span id="themeLabel"></span></div>
  <div id="nameBar">
    <label for="nameInput">Name (optional)</label>
    <input id="nameInput" type="text" maxlength="10" placeholder="Whose drawing is this?" />
    <button id="cameraBtn" class="iconBtn" title="Take a photo">📷</button>
    <button id="galleryBtn" class="iconBtn" title="Upload a photo">🖼️</button>
    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none" />
    <input type="file" id="galleryInput" accept="image/*" style="display:none" />
  </div>
  <div id="messageBar">
    <label for="messageInput">Message</label>
    <input id="messageInput" type="text" maxlength="80" placeholder="Say something! (optional, works without a drawing too)" />
  </div>

  <div id="canvasWrap">
    <canvas id="canvas"></canvas>
  </div>

  <div id="toolbar">
    <div class="colorBtn active" data-color="#222222" style="background:#222222"></div>
    <div class="colorBtn" data-color="#ff5252" style="background:#ff5252"></div>
    <div class="colorBtn" data-color="#ff9800" style="background:#ff9800"></div>
    <div class="colorBtn" data-color="#ffd600" style="background:#ffd600"></div>
    <div class="colorBtn" data-color="#4caf50" style="background:#4caf50"></div>
    <div class="colorBtn" data-color="#2196f3" style="background:#2196f3"></div>
    <div class="colorBtn" data-color="#9c27b0" style="background:#9c27b0"></div>
    <div class="colorBtn" data-color="#ffffff" style="background:#ffffff"></div>

    <div class="sizeBtn" data-size="6"><span style="width:6px;height:6px;"></span></div>
    <div class="sizeBtn active" data-size="12"><span style="width:12px;height:12px;"></span></div>
    <div class="sizeBtn" data-size="22"><span style="width:20px;height:20px;"></span></div>
  </div>

  <div id="actionBar">
    <button id="undoBtn" class="actionBtn" disabled>↩ Undo</button>
    <button id="clearBtn" class="actionBtn">Clear</button>
    <button id="sendBtn" class="actionBtn">Send to Screen 🚀</button>
  </div>
</div>

<div id="toast">Sent to the screen! 🎉</div>

<script src="/themes.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script>
  const sessionId = location.pathname.split('/').filter(Boolean).pop();
  const socket = io();

  const appEl = document.getElementById('app');
  const loadingMsg = document.getElementById('loadingMsg');
  const errorBox = document.getElementById('errorBox');
  const themeBar = document.getElementById('themeBar');
  const themeLabel = document.getElementById('themeLabel');
  const connStatus = document.getElementById('connStatus');

  let everConnected = false;
  socket.on('connect', () => {
    if (everConnected) {
      connStatus.textContent = 'Reconnected ✓';
      connStatus.className = 'show ok';
      setTimeout(() => connStatus.classList.remove('show'), 2000);
    }
    everConnected = true;
  });
  socket.on('disconnect', () => {
    connStatus.textContent = 'Connection lost — retrying…';
    connStatus.className = 'show warn';
  });

  fetch(`/api/session/${sessionId}`)
    .then((r) => { if (!r.ok) throw new Error('not_found'); return r.json(); })
    .then((data) => {
      const t = THEMES[data.theme] || THEMES.ocean;
      themeBar.style.background = t.accent;
      themeLabel.textContent = `${t.emoji} Send a drawing to the ${data.title ? data.title + ' · ' : ''}${t.label} playground`;
      loadingMsg.style.display = 'none';
      appEl.classList.add('ready');
      socket.emit('joinSession', { sessionId, role: 'draw' });
      initCanvas();
    })
    .catch(() => {
      loadingMsg.style.display = 'none';
      errorBox.style.display = 'flex';
    });

  socket.on('sessionEnded', () => {
    appEl.classList.remove('ready');
    errorBox.style.display = 'flex';
  });

  socket.on('drawingRejected', ({ reason } = {}) => {
    const msg = reason === 'too_large'
      ? 'Your drawing is too large! Please make it a bit smaller 🙏'
      : reason === 'paused'
      ? 'The host paused new drawings for a moment, please try again soon ⏸️'
      : "You're sending too fast, please wait a moment ⏳";
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1500);
  });

  function initCanvas() {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const wrap = document.getElementById('canvasWrap');

    let drawColor = '#222222';
    let brushSize = 12;
    let drawing = false;
    let lastX = 0, lastY = 0;
    let hasDrawn = false;

    const UNDO_LIMIT = 12;
    let undoStack = [];
    const undoBtn = document.getElementById('undoBtn');

    function updateUndoButton() {
      undoBtn.disabled = undoStack.length === 0;
    }

    function saveUndoState() {
      try {
        undoStack.push(canvas.toDataURL('image/png'));
        if (undoStack.length > UNDO_LIMIT) undoStack.shift();
        updateUndoButton();
      } catch (e) {}
    }

    function undo() {
      if (undoStack.length === 0) return;
      const prev = undoStack.pop();
      const img = new Image();
      img.onload = () => {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);
        hasDrawn = true;
        updateUndoButton();
      };
      img.src = prev;
    }
    undoBtn.addEventListener('click', undo);

    function resizeCanvas() {
      const rect = wrap.getBoundingClientRect();
      const prev = document.createElement('canvas');
      prev.width = canvas.width; prev.height = canvas.height;
      prev.getContext('2d').drawImage(canvas, 0, 0);

      canvas.width = rect.width;
      canvas.height = rect.height;
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(prev, 0, 0);
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      // 캔버스 크기가 바뀌면 이전 undo 스냅샷 크기가 안 맞을 수 있어 초기화
      undoStack = [];
      updateUndoButton();
    }
    window.addEventListener('resize', resizeCanvas);
    // 백그라운드 탭에서 로딩된 경우 레이아웃 계산이 0으로 잡힐 수 있어, 화면에 보이게 되는 시점에 다시 계산
    document.addEventListener('visibilitychange', () => { if (!document.hidden) resizeCanvas(); });
    resizeCanvas();
    requestAnimationFrame(resizeCanvas);

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      if (e.touches && e.touches.length > 0) {
        return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
      }
      return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    function startDraw(e) {
      e.preventDefault();
      saveUndoState();
      drawing = true;
      hasDrawn = true;
      const p = getPos(e);
      lastX = p.x; lastY = p.y;
      ctx.beginPath();
      ctx.arc(p.x, p.y, brushSize / 2, 0, Math.PI * 2);
      ctx.fillStyle = drawColor;
      ctx.fill();
    }

    function moveDraw(e) {
      if (!drawing) return;
      e.preventDefault();
      const p = getPos(e);
      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(p.x, p.y);
      ctx.strokeStyle = drawColor;
      ctx.lineWidth = brushSize;
      ctx.stroke();
      lastX = p.x; lastY = p.y;
    }

    function endDraw() { drawing = false; }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', moveDraw);
    window.addEventListener('mouseup', endDraw);
    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', moveDraw, { passive: false });
    canvas.addEventListener('touchend', endDraw);
    canvas.addEventListener('touchcancel', endDraw);

    document.querySelectorAll('.colorBtn').forEach((btn) => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.colorBtn').forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
        drawColor = btn.dataset.color;
      });
    });

    document.querySelectorAll('.sizeBtn').forEach((btn) => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.sizeBtn').forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
        brushSize = parseInt(btn.dataset.size, 10);
      });
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      saveUndoState();
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      hasDrawn = false;
    });

    function loadPhotoFile(file) {
      if (!file) return;
      saveUndoState();
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
          const w = img.width * scale;
          const h = img.height * scale;
          const x = (canvas.width - w) / 2;
          const y = (canvas.height - h) / 2;
          ctx.drawImage(img, x, y, w, h);
          hasDrawn = true;
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    const cameraInput = document.getElementById('cameraInput');
    const galleryInput = document.getElementById('galleryInput');
    document.getElementById('cameraBtn').addEventListener('click', () => cameraInput.click());
    document.getElementById('galleryBtn').addEventListener('click', () => galleryInput.click());
    cameraInput.addEventListener('change', (e) => {
      loadPhotoFile(e.target.files[0]);
      e.target.value = '';
    });
    galleryInput.addEventListener('change', (e) => {
      loadPhotoFile(e.target.files[0]);
      e.target.value = '';
    });

    function extractDrawing() {
      const w = canvas.width, h = canvas.height;
      const imgData = ctx.getImageData(0, 0, w, h);
      const d = imgData.data;
      let minX = w, minY = h, maxX = 0, maxY = 0;
      let found = false;

      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const i = (y * w + x) * 4;
          const r = d[i], g = d[i + 1], b = d[i + 2];
          if (!(r > 245 && g > 245 && b > 245)) {
            d[i + 3] = 255;
            found = true;
            if (x < minX) minX = x;
            if (x > maxX) maxX = x;
            if (y < minY) minY = y;
            if (y > maxY) maxY = y;
          } else {
            d[i + 3] = 0;
          }
        }
      }
      if (!found) return null;

      const pad = 10;
      minX = Math.max(0, minX - pad);
      minY = Math.max(0, minY - pad);
      maxX = Math.min(w - 1, maxX + pad);
      maxY = Math.min(h - 1, maxY + pad);

      ctx.putImageData(imgData, 0, 0);

      const cropW = maxX - minX + 1;
      const cropH = maxY - minY + 1;
      const out = document.createElement('canvas');
      out.width = cropW;
      out.height = cropH;
      out.getContext('2d').drawImage(canvas, minX, minY, cropW, cropH, 0, 0, cropW, cropH);

      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      return out.toDataURL('image/png');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 900);
    }

    document.getElementById('sendBtn').addEventListener('click', () => {
      const messageInput = document.getElementById('messageInput');
      const message = messageInput.value.trim();
      if (!hasDrawn && !message) { showToast('Please draw or type something first! ✏️'); return; }

      let dataUrl = null;
      if (hasDrawn) {
        saveUndoState();
        dataUrl = extractDrawing();
        if (!dataUrl && !message) { showToast('Please draw or type something first! ✏️'); return; }
      }
      const name = document.getElementById('nameInput').value.trim();
      socket.emit('newDrawing', { image: dataUrl, message, name });
      hasDrawn = false;
      messageInput.value = '';
      showToast('Sent to the screen! 🎉');
    });
  }
</script>
</body>
</html>
